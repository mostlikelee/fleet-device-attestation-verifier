services:
  - type: web
    name: fleet-device-attestation-verifier
    runtime: node
    plan: starter
    region: oregon
    branch: master
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: FLEET_URL
        sync: false
      - key: FLEET_TOKEN
        sync: false
      - key: WEBHOOK_TOKEN
        sync: false
      - key: ALLOWED_LABELS
        sync: false
      - key: LOGGING_LEVEL
        value: info
